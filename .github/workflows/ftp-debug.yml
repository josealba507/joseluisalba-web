name: FTP Debug

on:
  workflow_dispatch:

jobs:
  list-remote:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect secret values (safe — no content printed)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          echo "FTP_SERVER length: ${#FTP_SERVER}"
          echo "FTP_SERVER starts with ftp://: $(if [[ "$FTP_SERVER" == ftp://* ]]; then echo yes; else echo no; fi)"
          echo "FTP_SERVER has leading/trailing whitespace: $(if [[ "$FTP_SERVER" != "$(echo "$FTP_SERVER" | xargs)" ]]; then echo yes; else echo no; fi)"
          echo "FTP_SERVER has trailing slash: $(if [[ "$FTP_SERVER" == */ ]]; then echo yes; else echo no; fi)"
          echo "---"
          echo "FTP_USERNAME length: ${#FTP_USERNAME}"
          echo "---"
          echo "FTP_REMOTE_DIR length: ${#FTP_REMOTE_DIR}"
          echo "FTP_REMOTE_DIR starts with /: $(if [[ "$FTP_REMOTE_DIR" == /* ]]; then echo yes; else echo no; fi)"
          echo "FTP_REMOTE_DIR ends with /: $(if [[ "$FTP_REMOTE_DIR" == */ ]]; then echo yes; else echo no; fi)"

      - name: List remote directory (including dotfiles)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          echo "--- Directory listing ---"
          curl -s --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER$FTP_REMOTE_DIR"

      - name: Show .htaccess if present
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          echo "--- .htaccess content (if any) ---"
          curl -s --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER$FTP_REMOTE_DIR.htaccess" || echo "(no .htaccess or fetch failed)"
