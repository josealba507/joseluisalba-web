name: FTP Debug

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Create test file
        run: echo "hello-$(date +%s)" > test-upload.txt

      - name: Upload one file with full debug output
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -d -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" <<'EOF'
          set ssl:verify-certificate no
          set ftp:passive-mode true
          debug 5
          put test-upload.txt -o test-upload.txt
          bye
          EOF

      - name: Verify via a fresh connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "--- local file ---"
          cat test-upload.txt
          echo "--- remote listing ---"
          curl -s --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER/test-upload.txt"
          echo ""
          echo "--- remote file size via LIST ---"
          curl -s --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER/" | grep test-upload
