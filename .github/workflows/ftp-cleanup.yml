name: FTP Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: List account root and correct public_html
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" <<'EOF'
          set ssl:verify-certificate no
          echo "--- account root ---"
          cls -la
          echo "--- public_html ---"
          cls -la public_html
          bye
          EOF

      - name: Remove stray test files from correct public_html
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ssl:verify-certificate no
          cd $FTP_REMOTE_DIR
          rm -f test-upload.txt
          rm -f .ftp-deploy-sync-state.json
          echo "--- after cleanup ---"
          cls -la
          bye
          EOF
