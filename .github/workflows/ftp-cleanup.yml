name: FTP Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Remove stray files (repo source files + test files)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ssl:verify-certificate no
          cd $FTP_REMOTE_DIR
          echo "--- before cleanup ---"
          cls -la
          rm -f test-upload.txt
          rm -f .ftp-deploy-sync-state.json
          rm -f package.json
          rm -f package-lock.json
          rm -f tsconfig.json
          rm -f astro.config.mjs
          rm -f README.md
          rm -f CLAUDE.md
          rm -f .gitignore
          echo "--- after cleanup ---"
          cls -la
          bye
          EOF
